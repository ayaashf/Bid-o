<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coming Soon — Biddo</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #FF5E00;
      --orange-glow: #FF8C00;
      --orange-dim: #c44700;
      --black: #0A0A0A;
      --dark: #111111;
      --mid: #1a1a1a;
      --text: #f0f0f0;
      --muted: #888;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.4;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% 110%, rgba(255,94,0,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 80% 20%, rgba(255,94,0,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,94,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,94,0,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px 100px;
    }

    /* ── LOGO ── */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0px;
      margin-bottom: 44px;
      animation: fadeDown 0.8s ease both;
    }

    .brand-logo {
      width: clamp(90px, 18vw, 140px);
      height: auto;
      filter: drop-shadow(0 0 28px rgba(255,94,0,0.35));
      animation: pulse-logo 4s ease-in-out infinite;
    }

    @keyframes pulse-logo {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(255,94,0,0.3)); }
      50%       { filter: drop-shadow(0 0 44px rgba(255,140,0,0.6)); }
    }

    /* ── HEADLINE ── */
    .headline-wrap {
      text-align: center;
      margin-bottom: 20px;
      animation: fadeDown 0.9s 0.1s ease both;
    }

    .eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .eyebrow::before, .eyebrow::after {
      content: '';
      display: block;
      width: 30px;
      height: 1px;
      background: var(--orange);
      opacity: 0.6;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4rem, 12vw, 9rem);
      line-height: 0.9;
      letter-spacing: 0.02em;
      color: var(--text);
      text-shadow: 0 0 80px rgba(255,94,0,0.15);
    }

    h1 .highlight {
      color: var(--orange);
      display: block;
      text-shadow:
        0 0 40px rgba(255,94,0,0.5),
        0 0 80px rgba(255,94,0,0.2);
    }

    .sub {
      font-size: clamp(0.9rem, 2vw, 1.05rem);
      font-weight: 300;
      color: var(--muted);
      max-width: 420px;
      line-height: 1.7;
      text-align: center;
      margin: 20px auto 56px;
      animation: fadeDown 1s 0.2s ease both;
    }

    /* ── COUNTDOWN ── */
    .countdown {
      display: flex;
      gap: clamp(16px, 4vw, 48px);
      align-items: flex-start;
      justify-content: center;
      margin-bottom: 60px;
      animation: fadeUp 1s 0.4s ease both;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .unit-box {
      position: relative;
      width: clamp(70px, 16vw, 130px);
      height: clamp(80px, 18vw, 148px);
      background: var(--mid);
      border: 1px solid rgba(255,94,0,0.18);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .unit-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,94,0,0.5), transparent);
    }

    .unit-box::after {
      content: '';
      position: absolute;
      top: 50%; left: 0; right: 0;
      height: 1px;
      background: rgba(0,0,0,0.4);
    }

    .unit-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.8rem, 9vw, 6rem);
      color: var(--text);
      line-height: 1;
      transition: color 0.15s;
    }

    .unit-num.tick { color: var(--orange); }

    .unit-label {
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .sep {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 8vw, 5.5rem);
      color: rgba(255,94,0,0.3);
      line-height: 1;
      padding-top: clamp(12px, 3vw, 24px);
      animation: blink 1s step-end infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.15; } }

    /* ── EMAIL FORM ── */
    .notify {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 420px;
      animation: fadeUp 1s 0.6s ease both;
    }

    .notify p {
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .notify-row {
      display: flex;
      width: 100%;
      border: 1px solid rgba(255,94,0,0.3);
      border-radius: 3px;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .notify-row:focus-within {
      border-color: var(--orange);
      box-shadow: 0 0 20px rgba(255,94,0,0.1);
    }

    .notify-row input {
      flex: 1;
      background: rgba(255,255,255,0.03);
      border: none;
      outline: none;
      padding: 14px 18px;
      font-family: 'Barlow', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      min-width: 0;
    }

    .notify-row input::placeholder { color: #555; }

    .notify-row button {
      background: var(--orange);
      color: #fff;
      border: none;
      padding: 14px 22px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .notify-row button:hover { background: var(--orange-glow); }

    .success-msg {
      display: none;
      font-size: 0.82rem;
      color: var(--orange);
      letter-spacing: 0.1em;
    }

    /* ── FOOTER ── */
    .footer {
      position: fixed;
      bottom: 24px;
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 32px;
      animation: fadeUp 1s 0.8s ease both;
      z-index: 2;
    }

    .footer a {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer a:hover { color: var(--orange); }

    /* ── CORNER MARKS ── */
    .corner {
      position: fixed;
      width: 28px;
      height: 28px;
      border-color: rgba(255,94,0,0.3);
      border-style: solid;
      z-index: 2;
    }

    .corner-tl { top: 24px; left: 24px; border-width: 1px 0 0 1px; }
    .corner-tr { top: 24px; right: 24px; border-width: 1px 1px 0 0; }
    .corner-bl { bottom: 24px; left: 24px; border-width: 0 0 1px 1px; }
    .corner-br { bottom: 24px; right: 24px; border-width: 0 1px 1px 0; }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .sep { display: none; }
      .footer { gap: 18px; flex-wrap: wrap; padding: 0 20px; }
      .corner { display: none; }
    }
  </style>
</head>

    <div class="sep">:</div>

    </div>
    <div class="sep">:</div>
    <div class="unit">
      <div class="unit-box"><span class="unit-num" id="minutes">00</span></div>

<script>
  const LAUNCH = new Date(Date.now() + 365 * 24 * 60 * 60 * 1000);

  function pad(n) { return String(n).padStart(2, '0'); }

  function tick() {
    const diff = LAUNCH - Date.now();
    if (diff <= 0) return;

    const days    = Math.floor(diff / 86400000);
    const hours   = Math.floor((diff % 86400000) / 3600000);
    const minutes = Math.floor((diff % 3600000)  / 60000);
    const seconds = Math.floor((diff % 60000)    / 1000);

    const secEl = document.getElementById('seconds');
    secEl.textContent = pad(seconds);
    secEl.classList.add('tick');
    setTimeout(() => secEl.classList.remove('tick'), 150);

    document.getElementById('days').textContent    = pad(days);
    document.getElementById('hours').textContent   = pad(hours);
    document.getElementById('minutes').textContent = pad(minutes);
  }

  tick();
  setInterval(tick, 1000);

  function handleNotify() {
    const input = document.getElementById('email-input');
    const msg   = document.getElementById('success-msg');
    if (!input.value || !input.value.includes('@')) {
      input.style.outline = '1px solid var(--orange)';
      setTimeout(() => input.style.outline = '', 600);
      return;
    }
    input.closest('.notify-row').style.display = 'none';
    msg.style.display = 'block';
  }
</script>
